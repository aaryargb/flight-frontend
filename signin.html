<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyRoute — Sign In</title>
<link rel="stylesheet" href="style.css">
<style>
.signin-page {
    min-height: 100vh;
    background: linear-gradient(135deg, #e8f1ff 0%, #f4f6f9 50%, #fff7ed 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

.signin-card {
    background: white;
    border: 1px solid #e4e8ef;
    border-radius: 24px;
    padding: 48px 44px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.1);
    animation: slideUp 0.35s ease;
}

@keyframes slideUp {
    from { opacity:0; transform:translateY(20px); }
    to { opacity:1; transform:translateY(0); }
}

.signin-logo {
    text-align: center;
    margin-bottom: 28px;
}

.signin-logo .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 30px;
}

.signin-logo p {
    color: #9ba3af;
    font-size: 14px;
    margin-top: 6px;
    font-weight: 400;
}

.tab-bar {
    display: flex;
    background: #f4f6f9;
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
    gap: 4px;
}

.tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: #5a6070;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.15s;
}

.tab-btn.active {
    background: white;
    color: #007aff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

.form-group { margin-bottom: 16px; }

.form-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #9ba3af;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 7px;
}

.form-group input {
    width: 100%;
    background: #f4f6f9;
    border: 1.5px solid #e4e8ef;
    border-radius: 10px;
    padding: 12px 16px;
    color: #1a1a2e;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    outline: none;
    transition: 0.15s;
}

.form-group input:focus {
    border-color: #007aff;
    background: #f0f6ff;
}

.forgot-row {
    text-align: right;
    margin: -8px 0 20px;
}

.forgot-row a {
    color: #007aff;
    font-size: 13px;
    text-decoration: none;
    font-weight: 600;
}

.submit-btn {
    width: 100%;
    padding: 14px;
    background: #007aff;
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.15s;
    margin-bottom: 16px;
}

.submit-btn:hover { background: #0056cc; }

.divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #9ba3af;
    font-size: 13px;
    margin: 4px 0 16px;
}

.divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e4e8ef;
}

.google-btn {
    width: 100%;
    padding: 12px;
    background: white;
    border: 1.5px solid #e4e8ef;
    border-radius: 10px;
    color: #1a1a2e;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.15s;
    margin-bottom: 24px;
}

.google-btn:hover { border-color: #007aff; background: #f0f6ff; }

.bottom-text {
    text-align: center;
    font-size: 14px;
    color: #5a6070;
}

.bottom-text a { color: #007aff; text-decoration: none; font-weight: 600; }

.back-link {
    text-align: center;
    margin-top: 20px;
}

.back-link a { color: #9ba3af; font-size: 13px; text-decoration: none; }
.back-link a:hover { color: #5a6070; }

.forgot-panel, .signup-panel { display: none; }

@media(max-width:480px){
    .signin-card { padding: 32px 22px; }
}
</style>
</head>
<body>
<div class="signin-page">
  <div class="signin-card">

    <div class="signin-logo">
      <div class="logo-text"><span class="red">Sky</span><span class="blue">Route</span></div>
      <p>Smart flight comparison</p>
    </div>

    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" onclick="showTab('signin')">Sign In</button>
      <button class="tab-btn" onclick="showTab('signup')">Create Account</button>
    </div>

    <!-- SIGN IN -->
    <div id="signinPanel">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="siEmail" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="siPass" placeholder="Enter your password">
      </div>
      <div class="forgot-row"><a href="#" onclick="showForgot()">Forgot password?</a></div>
      <button class="submit-btn" onclick="doSignin()">Sign In</button>
      <div class="divider">or</div>
      <button class="google-btn">🌐 Continue with Google</button>
      <div class="bottom-text">No account? <a href="#" onclick="showTab('signup')">Sign up free →</a></div>
    </div>

    <!-- SIGN UP -->
    <div id="signupPanel">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Your name">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Create a password (min 8 chars)">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Repeat your password">
      </div>
      <button class="submit-btn" style="margin-top:8px">Create Account</button>
      <div class="divider">or</div>
      <button class="google-btn">🌐 Continue with Google</button>
      <div class="bottom-text">Already have an account? <a href="#" onclick="showTab('signin')">Sign in →</a></div>
    </div>

    <!-- FORGOT -->
    <div id="forgotPanel">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:44px;margin-bottom:12px">🔑</div>
        <h3 style="font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:6px">Reset password</h3>
        <p style="color:#9ba3af;font-size:14px">We'll send a reset link to your email</p>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="you@example.com">
      </div>
      <button class="submit-btn">Send Reset Link</button>
      <div class="bottom-text"><a href="#" onclick="showTab('signin')">← Back to Sign In</a></div>
    </div>

    <div class="back-link"><a href="index.html">← Back to SkyRoute</a></div>
  </div>
</div>

<script>
function showTab(tab){
    document.getElementById("signinPanel").style.display = tab==="signin"?"block":"none";
    document.getElementById("signupPanel").style.display = tab==="signup"?"block":"none";
    document.getElementById("forgotPanel").style.display = "none";
    document.getElementById("tabBar").style.display = "flex";
    document.querySelectorAll(".tab-btn").forEach((b,i) => {
        b.classList.toggle("active", (tab==="signin"&&i===0)||(tab==="signup"&&i===1));
    });
}

function showForgot(){
    document.getElementById("signinPanel").style.display = "none";
    document.getElementById("signupPanel").style.display = "none";
    document.getElementById("forgotPanel").style.display = "block";
    document.getElementById("tabBar").style.display = "none";
}

function doSignin(){
    const e = document.getElementById("siEmail").value;
    const p = document.getElementById("siPass").value;
    if(!e||!p){ alert("Please fill in all fields"); return; }
    alert("Signed in! (Demo mode)");
    location.href = "index.html";
}
</script>
</body>
</html>
